<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Where the World Drinks Safely</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        #map {
            width: 100%;
            height: 100vh;
        }

        .legend {
            background: white;
            padding: 10px;
            line-height: 1.4;
            color: #333;
            box-shadow: 0 0 5px rgba(0,0,0,0.3);
            border-radius: 4px;
            font-size: 12px;
        }

        .legend i {
            width: 14px;
            height: 14px;
            float: left;
            margin-right: 6px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

<h2 style="text-align:center; background:#0b6fa4; color:white; padding:10px;">
    Where the World Drinks Safely — SDG 6.1.1
</h2>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Your data file -->
<script src="safewater_6_1_1.js"></script>

<script>
    var map = L.map('map').setView([20, 0], 2);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 6,
        minZoom: 2,
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    function getColor(d) {
        return d >= 81 ? '#08306b' :
               d >= 62 ? '#2171b5' :
               d >= 44 ? '#6baed6' :
               d >= 25 ? '#c6dbef' :
               d >= 6  ? '#eff3ff' :
                         '#cccccc';
    }

    function style(feature) {
        var value = feature.properties.safewater_2020_latestclean_2020;
        return {
            fillColor: getColor(value),
            weight: 0.7,
            opacity: 1,
            color: '#ffffff',
            fillOpacity: 0.9
        };
    }

    L.geoJSON(nationData, {
        style: style,
        onEachFeature: function (feature, layer) {
            var name = feature.properties.nam_en;
            var value = feature.properties.safewater_2020_latestclean_2020;

            layer.bindPopup(
                "<strong>" + name + "</strong><br>" +
                "Safely managed drinking water: " + value + "%"
            );
        }
    }).addTo(map);

    var legend = L.control({position: 'bottomright'});

legend.onAdd = function (map) {
    var div = L.DomUtil.create('div', 'legend'),
        grades = [6, 25, 44, 62, 81];

    div.innerHTML += "<strong>Access to Safe Water (%)</strong><br>";

    for (var i = 0; i < grades.length; i++) {
        var from = grades[i];
        var to = grades[i + 1];

        div.innerHTML +=
            '<i style="background:' + getColor(from + 0.1) + '"></i> ' +
            from + (to ? '&ndash;' + to + '%' : '% +') + '<br>';
    }

    // ⭐ ADD THIS LINE ⭐
    div.innerHTML += '<i style="background:#cccccc"></i> No data<br>';

    return div;
};


    legend.addTo(map);
</script>

</body>
</html>
